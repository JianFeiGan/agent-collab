# Parallel Refactor — Refactor two modules simultaneously, then integrate
#
# Demonstrates:
#   - Parallel independent tasks (auth + database refactored at the same time)
#   - Integration task that depends on both parallel tasks
#   - Scoped workdirs to prevent agents from interfering with each other

name: parallel-refactor
description: Refactor authentication and database modules in parallel, then integrate changes

agents:
  auth-agent:
    type: claude-code
    model: sonnet
    workdir: ./src/auth
    allowed_tools: [Read, Write, Edit]

  db-agent:
    type: claude-code
    model: sonnet
    workdir: ./src/db
    allowed_tools: [Read, Write, Edit]

  integrator:
    type: claude-code
    model: sonnet
    allowed_tools: [Read, Write, Edit, Bash]

tasks:
  - id: refactor-auth
    agent: auth-agent
    prompt: |
      Refactor the authentication module:
      - Extract token generation (JWT creation, validation) into a separate token.py
      - Add password hashing with bcrypt in a password.py module
      - Add type hints to all function signatures
      - Add docstrings explaining each public function
      - Split any functions over 30 lines into smaller focused functions
      - Ensure all imports are updated after the split
    outputs: [src/auth/]

  - id: refactor-database
    agent: db-agent
    prompt: |
      Refactor the database module:
      - Add connection pooling using SQLAlchemy's create_engine(pool_size=5)
      - Add retry logic with exponential backoff for transient failures
      - Extract raw SQL queries into typed query builder functions
      - Add type hints and docstrings to all public functions
      - Create a separate migrations.py for schema changes
      - Ensure all imports are updated after the split
    outputs: [src/db/]

  - id: update-imports
    depends_on: [refactor-auth, refactor-database]
    agent: integrator
    prompt: |
      The auth and db modules have been refactored. Now:
      - Update all import statements across the project to match the new module structure
      - Run the test suite to verify nothing is broken
      - Fix any import errors or missing references
      - Ensure all tests still pass after the refactor
    outputs: [src/]

strategy:
  max_parallel: 2
  retry_on_failure: true
  max_retries: 1
  timeout_per_task: 480
